<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoSleep Disk App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Divide screen into two equal vertical halves */
        .section {
            flex: 1;
            width: 100vw;
            position: relative;
            overflow: hidden;
        }

        /* UPPER PART: Absolute positioning based on percentages */
        .upper-part {
            border-bottom: 1px solid #222; /* Subtle divider */
        }

        .disk {
            position: absolute;
            width: 100px; /* 50px radius = 100px diameter */
            height: 100px;
            border-radius: 50%;
            transform: translate(-50%, -50%); /* Centers disk on the coordinate */
        }

        #red { background-color: red; left: 20%; top: 50%; }
        #green { background-color: green; left: 50%; top: 10%; }
        #blue { background-color: blue; left: 80%; top: 80%; }

        /* LOWER PART: 9x9 Distribution */
        .lower-part {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(9, 1fr);
            gap: 2px;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        .white-disk {
            background-color: white;
            border-radius: 50%;
            /* Maintain circular shape while fitting grid cell */
            aspect-ratio: 1 / 1;
            margin: auto;
            width: 90%;
            max-width: 100px; /* 50px radius limit */
        }

        /* Start Overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 20px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            border: 2px solid white;
            background: black;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn">START APP</button>
    </div>

    <div class="section upper-part">
        <div id="red" class="disk"></div>
        <div id="green" class="disk"></div>
        <div id="blue" class="disk"></div>
    </div>

    <div class="section lower-part">
        <div id="grid" class="grid-container">
            </div>
    </div>

    <script>
        const noSleep = new NoSleep();
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        const grid = document.getElementById('grid');

        // 1. Generate the 9x9 grid
        for (let i = 0; i < 81; i++) {
            const d = document.createElement('div');
            d.className = 'white-disk';
            grid.appendChild(d);
        }

        // 2. Handle Activation
        startBtn.addEventListener('click', () => {
            // Enable WakeLock
            noSleep.enable();

            // Request Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // Hide UI
            overlay.style.display = 'none';
        });

        // 3. Re-show overlay if user exits fullscreen
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                overlay.style.display = 'flex';
                noSleep.disable();
            }
        });
    </script>
</body>
</html>
