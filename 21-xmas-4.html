<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverted Christmas Mirror with Sledge</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            background-color: black;
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        .section {
            width: 100vw; height: 50vh;
            position: relative;
        }
        canvas { display: block; width: 100%; height: 100%; }
        .divider { height: 2px; background: #444; width: 100%; }
    </style>
</head>
<body>
    <div class="section"><canvas id="canvas-top"></canvas></div>
    <div class="divider"></div>
    <div class="section"><canvas id="canvas-bottom"></canvas></div>

    <script>
        const canvasT = document.getElementById('canvas-top');
        const canvasB = document.getElementById('canvas-bottom');
        const ctxT = canvasT.getContext('2d');
        const ctxB = canvasB.getContext('2d');

        let w, h;
        let snow = [];
        let stars = [];
        let sledgeX = -100; // Starting position off-screen

        function resize() {
            w = window.innerWidth;
            h = window.innerHeight / 2;
            canvasT.width = canvasB.width = w;
            canvasT.height = canvasB.height = h;
            
            snow = Array.from({length: 100}, () => ({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*2+1, s: Math.random()*1+0.5 }));
            stars = Array.from({length: 80}, () => ({ x: Math.random()*w, y: Math.random()*h, sz: Math.random()*1.5, p: Math.random()*Math.PI*2 }));
        }

        function drawSledge(ctx, x, y) {
            ctx.fillStyle = "#b22222"; // Deep red
            // Sledge body
            ctx.fillRect(x, y - 12, 50, 8);
            // Runners
            ctx.strokeStyle = "#ddd";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x - 5, y - 2);
            ctx.lineTo(x + 55, y - 2);
            ctx.stroke();
            // Vertical supports
            ctx.fillRect(x + 10, y - 5, 4, 5);
            ctx.fillRect(x + 35, y - 5, 4, 5);
        }

        function drawScene(ctx, isBottom) {
            ctx.save();
            if (isBottom) {
                ctx.translate(0, h); 
                ctx.scale(1, -1); 
            }

            // 1. Sky Gradient
            let grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, "#00030a");
            grad.addColorStop(1, "#0a1a3a");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // 2. Stars
            stars.forEach(s => {
                const twinkle = (Math.sin(Date.now() * 0.002 + s.p) + 1) / 2;
                ctx.fillStyle = `rgba(255, 255, 255, ${twinkle})`;
                ctx.fillRect(s.x, s.y, s.sz, s.sz);
            });

            // 3. Ground
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, h - 20, w, 20);

            // 4. Inverted Sledge Movement
            if (isBottom) {
                drawSledge(ctx, sledgeX, h - 20);
                sledgeX += 2; // Movement speed
                if (sledgeX > w + 100) sledgeX = -100; // Reset loop
            }

            // 5. Snowman
            const sx = w * 0.5, sy = h - 20;
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(sx, sy - 20, 20, 0, 7); ctx.fill();
            ctx.beginPath(); ctx.arc(sx, sy - 45, 15, 0, 7); ctx.fill();
            ctx.beginPath(); ctx.arc(sx, sy - 65, 10, 0, 7); ctx.fill();
            ctx.fillStyle = "orange";
            ctx.beginPath(); ctx.moveTo(sx, sy - 65); ctx.lineTo(sx + 12, sy - 63); ctx.lineTo(sx, sy - 61); ctx.fill();

            // 6. Trees
            [0.2, 0.8].forEach(pos => {
                const tx = w * pos, ty = h - 20;
                ctx.fillStyle = "#1b5e20";
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(tx - 30 + i*5, ty - i*20);
                    ctx.lineTo(tx + 30 - i*5, ty - i*20);
                    ctx.lineTo(tx, ty - 40 - i*20);
                    ctx.fill();
                }
            });
            ctx.restore();
        }

        function animate() {
            ctxT.fillStyle = "black";
            ctxT.fillRect(0, 0, w, h);
            ctxT.fillStyle = "white";
            snow.forEach(p => {
                ctxT.beginPath(); ctxT.arc(p.x, p.y, p.r, 0, 7); ctxT.fill();
                p.y = (p.y + p.s) % h;
            });

            drawScene(ctxB, true);
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
