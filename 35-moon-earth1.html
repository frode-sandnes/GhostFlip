<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space View App</title>
    <style>
        /* Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden; /* Prevents scrolling */
            font-family: Arial, sans-serif;
        }

        /* Full-screen Landing Page */
        #landing-page {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: 2px solid #fff;
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #fff;
            color: #000;
        }

        /* Main Content Grid */
        #main-page {
            display: none; /* Hidden until button click */
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .section {
            flex: 1; /* Divides page equally into 50% height each */
            width: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* Upper Section: Moon */
        #upper {
            justify-content: flex-start; /* Aligns content to the left */
        }

        .moon-img {
            max-height: 90%;
            margin-left: 5%; /* Slight offset to the left */
        }

        /* Lower Section: Earth */
        #lower {
            justify-content: center;
        }

        .earth-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures image covers the bottom grid */
            filter: brightness(2); /* Doubles the brightness */
        }
    </style>
</head>
<body>

    <div id="landing-page">
        <button onclick="startApp()">Start</button>
    </div>

    <div id="main-page">
        <div id="upper" class="section">
            <img src="moon1.png" alt="Moon" class="moon-img">
        </div>
        <div id="lower" class="section">
            <img src="earth3.png" alt="Earth" class="earth-img">
        </div>
    </div>

    <script>
        function startApp() {
            // Hide landing page
            document.getElementById('landing-page').style.display = 'none';
            // Show main grid page
            document.getElementById('main-page').style.display = 'flex';
        }
    </script>

</body>
</html>
