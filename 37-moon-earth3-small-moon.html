<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space View App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden; /* Prevents viewport overflow */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Start Screen */
        #landing-page {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            z-index: 10;
            position: absolute;
            background: black;
        }

        #start-btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            cursor: pointer;
            background: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            background: white;
            color: black;
        }

        /* Main App Layout */
        #main-page {
            display: none; /* Hidden until start */
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .container {
            flex: 1; /* Splits height 50/50 */
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* Upper Section: Moon */
        #upper-section {
            justify-content: flex-start;
        }

        .moon-img {
            height: 15%;
            margin-left: 30%; /* Slight offset to the left */
            filter: brightness(4);
            transform: scaleY(1.3);
            object-fit: contain;
        }

        /* Lower Section: Earth */
        #lower-section {
            justify-content: center;
        }

        .earth-img {
            max-width: 100%;
            max-height: 100%;
            /* Filter: Double brightness | Rotate: 90deg clockwise */
            filter: brightness(3);
            transform: rotate(90deg);
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="landing-page">
        <button id="start-btn">START EXPERIENCE</button>
    </div>

    <div id="main-page">
        <div id="upper-section" class="container">
            <img src="moon1.png" alt="Moon" class="moon-img">
        </div>
        <div id="lower-section" class="container">
            <img src="earth3.png" alt="Earth" class="earth-img">
        </div>
    </div>

    <script>
        const noSleep = new NoSleep();
        const startBtn = document.getElementById('start-btn');
        const landingPage = document.getElementById('landing-page');
        const mainPage = document.getElementById('main-page');

        startBtn.addEventListener('click', function() {
            // 1. Enable NoSleep (Must be triggered by user interaction)
            noSleep.enable();
            console.log("NoSleep enabled: Screen will stay awake.");

            // 2. Switch Views
            landingPage.style.display = 'none';
            mainPage.style.display = 'flex';
            
            // Optional: Request Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
