<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Symmetric Split App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <style>
        /* Reset margins and hidden overflow to ensure no scrolling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Flex container to split screen into two equal rows */
        .main-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        /* Upper and Lower halves */
        .upper-part, .lower-part {
            flex: 1; /* Each takes exactly 50% height */
            width: 100%;
            position: relative;
        }

        /* Gray bar: Left side to center (50% width) */
        .gray-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%; /* Covers left edge to center */
            height: 100%;
            background-color: gray;
        }

        /* White bar: Right side to center (50% width) */
        .white-bar {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%; /* Covers right edge to center */
            height: 70%; /* Extends down 70% of the lower part */
            background-color: white;
        }

        /* Interaction Overlay for WakeLock activation */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        button {
            padding: 20px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            background: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn">START APP</button>
    </div>

    <div class="main-container">
        <div class="upper-part">
            <div class="gray-bar"></div>
        </div>

        <div class="lower-part">
            <div class="white-bar"></div>
        </div>
    </div>

    <script>
        const noSleep = new NoSleep();
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');

        startBtn.addEventListener('click', function() {
            // Enable wake lock to prevent screen dimming
            noSleep.enable();

            // Request Fullscreen for immersive experience
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen();
            } else if (docEl.webkitRequestFullscreen) {
                docEl.webkitRequestFullscreen();
            }

            // Hide the overlay
            overlay.style.display = 'none';
        }, false);

        // Optional: Bring overlay back if user exits fullscreen
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                overlay.style.display = 'flex';
                noSleep.disable();
            }
        });
    </script>
</body>
</html>
